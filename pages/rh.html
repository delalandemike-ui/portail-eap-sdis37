<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RH - Portail EAP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="container">
      <h1>Ressources humaines - Filière EAP</h1>
      <p>Gestion des personnels EAP du SDIS37</p>
    </div>
  </header>

  <main class="container">
    <nav class="top-nav">
      <a href="index.html" class="btn">← Retour à l'accueil</a>
    </nav>

    <section class="stats-grid">
      <div class="stat-box">
        <span class="stat-label">Total EAP</span>
        <strong class="stat-value" id="stat-total">0</strong>
      </div>
      <div class="stat-box">
        <span class="stat-label">EAP 1</span>
        <strong class="stat-value" id="stat-eap1">0</strong>
      </div>
      <div class="stat-box">
        <span class="stat-label">EAP 2</span>
        <strong class="stat-value" id="stat-eap2">0</strong>
      </div>
      <div class="stat-box">
        <span class="stat-label">EAP 3</span>
        <strong class="stat-value" id="stat-eap3">0</strong>
      </div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <button class="btn btn-add" onclick="ouvrirFormulaire()">+ Ajouter un EAP</button>
        <input type="text" class="search-box" id="recherche" placeholder="Rechercher un nom..." onkeyup="filtrerTableau()" />
        <div class="filters">
          <select class="filter-select" id="filtre-niveau" onchange="filtrerTableau()">
            <option value="">Tous les niveaux</option>
            <option value="EAP 1">EAP 1</option>
            <option value="EAP 2">EAP 2</option>
            <option value="EAP 3">EAP 3</option>
          </select>
          <select class="filter-select" id="filtre-groupement" onchange="filtrerTableau()">
            <option value="">Tous les groupements</option>
          </select>
          <select class="filter-select" id="filtre-cis" onchange="filtrerTableau()">
            <option value="">Tous les CIS</option>
          </select>
        </div>
      </div>

      <h2>Liste des personnels EAP</h2>

      <table>
        <thead>
          <tr>
            <th>Nom</th>
            <th>Prénom</th>
            <th>Grade</th>
            <th>Niveau EAP</th>
            <th>Groupement</th>
            <th>CIS</th>
            <th>Heures</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableau-eap">
          <!-- Les lignes seront générées par JavaScript -->
        </tbody>
      </table>
    </section>
  </main>

  <!-- Fenêtre modale pour ajouter/modifier -->
  <div id="modal" class="modal" style="display: none;">
    <div class="modal-content">
      <h2 id="modal-titre">Ajouter un EAP</h2>
      <form id="formulaire-eap">
        <input type="hidden" id="eap-id" />
        
        <label>Nom *</label>
        <input type="text" id="eap-nom" required />
        
        <label>Prénom *</label>
        <input type="text" id="eap-prenom" required />
        
        <label>Grade</label>
        <input type="text" id="eap-grade" />
        
        <label>Niveau EAP *</label>
        <select id="eap-niveau" required>
          <option value="">-- Choisir --</option>
          <option value="EAP 1">EAP 1</option>
          <option value="EAP 2">EAP 2</option>
          <option value="EAP 3">EAP 3</option>
        </select>
        
        <label>Groupement</label>
        <input type="text" id="eap-groupement" />
        
        <label>CIS</label>
        <input type="text" id="eap-cis" />
        
        <label>Heures</label>
        <input type="number" id="eap-heures" step="0.5" value="0" />
        
        <label>Dernière FMPA</label>
        <input type="date" id="eap-derniere-fmpa" />
        
        <label>Prochaine FMPA</label>
        <input type="date" id="eap-prochaine-fmpa" />
        
        <label>Actif</label>
        <select id="eap-actif">
          <option value="1">Oui</option>
          <option value="0">Non</option>
        </select>
        
        <label>Observations</label>
        <textarea id="eap-observations" rows="3"></textarea>
        
        <div class="modal-actions">
          <button type="submit" class="btn btn-add">Enregistrer</button>
          <button type="button" class="btn" onclick="fermerFormulaire()">Annuler</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
